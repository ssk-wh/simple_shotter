name: Build & Package

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-nsis
            zip

      - name: Build
        run: |
          set -euo pipefail
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Extract version
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep -oP 'project\(EasyShotter VERSION \K[0-9.]+' CMakeLists.txt)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Collect dist files
        run: |
          set -euo pipefail
          rm -rf installer/dist
          mkdir -p installer/dist/platforms

          cp build/src/EasyShotter.exe installer/dist/
          cp resources/app_icon.ico installer/dist/

          # Collect MinGW runtime DLLs
          while IFS= read -r dll; do
            cp "$dll" installer/dist/
          done < <(ldd build/src/EasyShotter.exe | grep -i mingw64 | awk '{print $3}')

          # Qt platform plugin
          QT_PLUGIN_DIR=$(qmake -query QT_INSTALL_PLUGINS 2>/dev/null || echo "/mingw64/share/qt5/plugins")
          cp "$QT_PLUGIN_DIR/platforms/qwindows.dll" installer/dist/platforms/

          echo "Collected $(find installer/dist -type f | wc -l) files"

      - name: Build NSIS installer
        run: |
          set -euo pipefail
          cd installer
          sed -i "s/!define APP_VERSION \".*\"/!define APP_VERSION \"$VERSION\"/" EasyShotter.nsi
          makensis EasyShotter.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: EasyShotter-${{ env.VERSION }}-Setup.zip
          path: installer/EasyShotter-*-Setup.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: EasyShotter-${{ env.VERSION }}-Portable.zip
          path: installer/dist/

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^[^(]*(\([^)]*\)).*/\1/p' debian/changelog | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper cmake qtbase5-dev libqt5x11extras5-dev \
            libxcb1-dev libxcb-ewmh-dev libxcb-icccm4-dev libx11-dev \
            libatspi2.0-dev libglib2.0-dev pkg-config \
            fakeroot dpkg-dev librsvg2-bin

      - name: Generate PNG icons from SVG
        run: |
          cd resources
          for size in 16 24 32 48 128 256 512; do
            rsvg-convert -w $size -h $size app-icon.svg -o easyshotter_${size}.png
          done

      - name: Build DEB package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../easyshotter_*.deb dist/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyshotter_${{ steps.version.outputs.version }}_amd64.zip
          path: dist/*.deb

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Find and copy all release files from artifact directories
          find artifacts -name '*.exe' -exec cp {} release/ \;
          find artifacts -name '*.deb' -exec cp {} release/ \;
          # Create portable zip from the portable artifact directory
          PORTABLE_DIR=$(find artifacts -type d -name '*Portable*' | head -1)
          if [ -n "$PORTABLE_DIR" ]; then
            cd "$PORTABLE_DIR"
            zip -r "$GITHUB_WORKSPACE/release/$(basename "$PORTABLE_DIR")" .
            cd "$GITHUB_WORKSPACE"
          fi
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
